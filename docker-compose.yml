services:
  db:
    image: postgres:16
    container_name: scicommons-local-db
    environment:
      POSTGRES_USER: scicommons
      POSTGRES_PASSWORD: scicommons
      POSTGRES_DB: scicommons
    ports:
      - "5432:5432"
    volumes:
      - scicommons_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scicommons -d scicommons"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  scicommons_pgdata:
